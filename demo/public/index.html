<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Lokaal Agent Swarm</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:," />
</head>
<body class="login-page">
  <div class="login-wrap">
    <form id="login-form" class="login-card" autocomplete="on">
      <div class="ms-logo" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
      <h1>Lokaal Agent Swarm</h1>
      <p class="sub">Microsoft Build AI Hackathon · live demo</p>
      <label>Username<input id="username" type="text" autocomplete="username" placeholder="Username" /></label>
      <label>Password<input id="password" type="password" autocomplete="current-password" placeholder="Password" /></label>
      <button type="submit" id="login-btn">Sign in</button>
      <p id="login-error" class="login-error" hidden></p>
    </form>
  </div>
  <script src="login.js"></script>
</body>
</html>
