services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: mainlogic-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api:
    build: .
    image: mainlogic-app:latest
    container_name: mainlogic-api
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Use RABBITMQ_URL consistently with config.ts
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: ["npm", "start"]

  worker-location:
    image: mainlogic-app:latest
    container_name: mainlogic-worker-location
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: ["npm", "run", "worker:location:prod"]

  worker-notifications:
    image: mainlogic-app:latest
    container_name: mainlogic-worker-notifications
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: ["npm", "run", "worker:notifications:prod"]

  worker-messaging:
    image: mainlogic-app:latest
    container_name: mainlogic-worker-messaging
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: ["npm", "run", "worker:messaging:prod"]

  nginx:
    image: nginx:alpine
    container_name: mainlogic-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  rabbitmq_data:
