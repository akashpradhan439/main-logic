services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: mainlogic-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api:
    build: .
    image: mainlogic-app:latest
    container_name: mainlogic-api
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - N8N_MEETUP_WEBHOOK_URL=http://n8n:5678/webhook/meetup-spots
      - N8N_MEETUP_SUGGESTIONS_WEBHOOK_URL=http://n8n:5678/webhook/meetup-suggestions
      - N8N_EVENTS_SCRAPER_WEBHOOK_URL=http://n8n:5678/webhook/events-scraper
    command: ["npm", "start"]

  worker-location:
    build: .
    image: mainlogic-app:latest
    container_name: mainlogic-worker-location
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: ["npm", "run", "worker:location:prod"]

  worker-notifications:
    build: .
    image: mainlogic-app:latest
    container_name: mainlogic-worker-notifications
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: ["npm", "run", "worker:notifications:prod"]

  worker-messaging:
    build: .
    image: mainlogic-app:latest
    container_name: mainlogic-worker-messaging
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    command: ["npm", "run", "worker:messaging:prod"]

  scraper:
    build: ./n8n-workflows/scraper-service
    image: mainlogic-scraper:latest
    container_name: mainlogic-scraper
    restart: always
    volumes:
      - scraper_cache:/data

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: mainlogic-n8n
    restart: always
    depends_on:
      api:
        condition: service_started
      scraper:
        condition: service_started
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - APP_BASE_URL=http://api:3000
      - SCRAPER_SERVICE_URL=http://scraper:8080
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "n8n import:workflow --input=/home/node/workflows/meetup-spots.json && n8n publish:workflow --id=meetup-spots-v1 && n8n import:workflow --input=/home/node/workflows/meetup-suggestions.json && n8n publish:workflow --id=meetup-suggestions-v1 && n8n import:workflow --input=/home/node/workflows/events-scraper.json && n8n publish:workflow --id=events-scraper-v1 && n8n start"

  # Reuses the image built by the `api` service (same Dockerfile/context) instead
  # of declaring its own `build:`, which would make BuildKit run a second full
  # image build in parallel and exhaust the VM's RAM during deploy.
  demo:
    image: mainlogic-app:latest
    container_name: mainlogic-demo
    restart: always
    depends_on:
      - api
    env_file:
      - .env
    environment:
      - DEMO_HOST=0.0.0.0
      - DEMO_PORT=4505
    command: ["node", "dist/demo/server.js"]

  # iskcon-site:
  #   build: ./iskcon-site
  #   image: iskcon-site:latest
  #   container_name: iskcon-site
  #   restart: always

  nginx:
    image: nginx:alpine
    container_name: mainlogic-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - demo
      # - iskcon-site

volumes:
  rabbitmq_data:
  n8n_data:
  scraper_cache:
